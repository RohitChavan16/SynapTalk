version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: synaptalk-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  mongo:
    image: mongo:6
    container_name: synaptalk-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app1:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: synaptalk-app1
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=development
      - PORT=5001
      - MONGODB_URI=mongodb://mongo:27017
      - REDIS_URI=redis://redis:6379
    env_file:
      - ./server/.env
    depends_on:
      - mongo
      - redis
    volumes:
      - ./server:/app
      - /app/node_modules

  app2:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: synaptalk-app2
    ports:
      - "5002:5002"
    environment:
      - NODE_ENV=development
      - PORT=5002
      - MONGODB_URI=mongodb://mongo:27017
      - REDIS_URI=redis://redis:6379
    env_file:
      - ./server/.env
    depends_on:
      - mongo
      - redis
    volumes:
      - ./server:/app
      - /app/node_modules

volumes:
  mongo_data:
  redis_data:
